name: "Phpunit"

on:
  pull_request:

  push:
    branches: [ "*" ]

  schedule:
    - cron: "0 8 * * 1"

jobs:
  test82:
    name: "Phpunit"
    uses: contributte/.github/.github/workflows/phpunit.yml@v1
    with:
      php: "8.2"
      make: "init tests"

  test83:
    name: "Phpunit"
    uses: contributte/.github/.github/workflows/phpunit.yml@v1
    with:
      php: "8.3"
      make: "init tests"

  test84:
    name: "Phpunit"
    uses: contributte/.github/.github/workflows/phpunit.yml@v1
    with:
      php: "8.4"
      make: "init tests"

  test85:
    name: "Phpunit"
    uses: contributte/.github/.github/workflows/phpunit.yml@v1
    with:
      php: "8.5"
      make: "init tests"
